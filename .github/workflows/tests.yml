# Runs the vapoursynth-mvc test suite on every push / pull request, mirroring the
# edge264 project's CI: build, then `make check`.
#
#   test         - builds the decode core + both plugins and exercises the core
#                  and the VapourSynth glue through the standalone core test and
#                  the mock VapourSynth API4 host (no host install needed).
#   vapoursynth  - additionally builds a real VapourSynth runtime and loads the
#                  built plugin with vspipe, the end-to-end proof.
#   avisynth     - builds a real AviSynth+ runtime and loads the built AviSynth+
#                  plugin through its C API, the end-to-end proof for that glue.
#   windows-cross- cross-compiles both the plugin DLL and the core test with
#                  MinGW-w64, verifies the DLL's exports, and runs the Windows
#                  core under Wine bit-exact vs an edge264 reference (proves the
#                  Win32 file-mapping I/O shim decodes identically).
#
# All build edge264-mvc from source (statically linked into the plugins) and use
# an MVC conformance fixture from the cloned edge264 tree as the test stream. The
# vapoursynth, avisynth and windows-cross jobs each bit-exact-verify against an
# edge264 reference regenerated in the run.
name: Tests

on:
  push:
    paths-ignore: [".gitignore", "LICENSE", "README.md"]
  pull_request:
    paths-ignore: [".gitignore", "LICENSE", "README.md"]

env:
  # edge264-mvc ref to build against; pinned to a release tag for reproducibility
  # (git clone --depth 1 --branch accepts tags/branches but NOT commit SHAs, so a
  # tag is required here). Bump when validating against a newer edge264-mvc.
  EDGE264_REF: v2026.07.18
  # AviSynth+ release to build the avisynth job against; pinned for reproducibility
  # and kept in sync with the vendored include/avisynth*.h headers. Bump both together.
  AVSPLUS_REF: v3.7.3
  TEST_FILE: ../edge264/tests/conformance/mvc/MVCDS-4.264

jobs:
  test:
    name: Core + plugin (mock VapourSynth host)
    runs-on: ubuntu-latest
    # Gate make check on the exact portable ISA the release ships (x86-64-v2 floor +
    # AVX2 runtime dispatch, see release.yml), not a native build, so the
    # distributed build's correctness - not merely a native one's - is CI-verified.
    # Scoped to this job only: the vapoursynth/avisynth jobs build a native
    # edge264_test reference in the same edge264 tree, and mixing its default
    # VARIANTS=logs with a v2/v3 plugin build would re-archive libedge264.a without
    # the variant objects the core references. This job builds no edge264_test.
    env:
      EDGE264_MAKE: "VARIANTS=x86-64-v2,x86-64-v3 CFLAGS=-march=x86-64-v2"
    steps:
      - uses: actions/checkout@v5
      - name: Fetch edge264-mvc
        run: git clone --depth 1 --branch "$EDGE264_REF" https://github.com/jens-duttke/edge264-mvc ../edge264
      - name: Build and run the test suite
        run: make check TEST_FILE="$TEST_FILE"

  vapoursynth:
    name: Real VapourSynth runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch edge264-mvc
        run: git clone --depth 1 --branch "$EDGE264_REF" https://github.com/jens-duttke/edge264-mvc ../edge264
      - name: Install VapourSynth build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm python3-dev libzimg-dev pkg-config
          # Ubuntu's Cython is too old for Python 3.12 (generates code that fails
          # to compile: "'digits' was not declared"); use a current one.
          python3 -m pip install --user --break-system-packages -U 'Cython>=3.0.11'
      - name: Build and install VapourSynth
        run: |
          # Pinned to the release the plugin was validated against (Core R77);
          # bump the tag when re-validating against a newer VapourSynth.
          git clone --depth 1 --branch R77 https://github.com/vapoursynth/vapoursynth /tmp/vapoursynth
          cd /tmp/vapoursynth
          export PATH="$HOME/.local/bin:$PATH"
          # -Dpython.bytecompile=-1: skip meson's post-install byte-compile step. It
          # runs the interpreter against the just-installed vapoursynth module, which
          # is not importable during install (its dist-packages dir is off Ubuntu's
          # default sys.path and libvapoursynth is not yet in the linker cache), so it
          # aborts the install otherwise.
          meson setup build --prefix=/usr/local -Dbuildtype=release -Dpython.bytecompile=-1
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig
          # VapourSynth installs its Python module, vspipe and shared lib under
          # <prefix>/lib/python3/dist-packages/vapoursynth - none of which Ubuntu puts
          # on the default search paths. Expose them for this and all later steps.
          VSMOD=/usr/local/lib/python3/dist-packages
          echo "PYTHONPATH=$VSMOD" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$VSMOD/vapoursynth" >> "$GITHUB_ENV"
          echo "$VSMOD/vapoursynth" >> "$GITHUB_PATH"
          PYTHONPATH="$VSMOD" LD_LIBRARY_PATH="$VSMOD/vapoursynth" python3 -m vapoursynth config
      - name: Build the plugin
        run: make libvsmvc.so
      - name: Load the plugin in vspipe (base + right + T&B)
        run: |
          vspipe --version
          vspipe -a plugin="$PWD/libvsmvc.so" -a source="$PWD/$TEST_FILE" -a stack=base  tests/test.vpy /dev/null
          vspipe -a plugin="$PWD/libvsmvc.so" -a source="$PWD/$TEST_FILE" -a stack=right tests/test.vpy /dev/null
          vspipe -a plugin="$PWD/libvsmvc.so" -a source="$PWD/$TEST_FILE" -a stack=tab   tests/test.vpy /dev/null
      - name: Bit-exact vs edge264 through vspipe (regenerated reference)
        run: |
          sudo apt-get install -y ffmpeg
          make -C ../edge264 STATIC=yes BUILDTEST=no edge264_test
          N=5   # keep in sync with the Makefile's BITEXACT_FRAME
          plugin=$(mktemp); ref=$(mktemp); trap 'rm -f "$plugin" "$ref"' EXIT
          vspipe -s $N -e $N -a plugin="$PWD/libvsmvc.so" -a source="$PWD/$TEST_FILE" -a stack=base tests/test.vpy "$plugin"
          # shared reference-extraction, same script the Makefile's check-bitexact uses
          sh tests/mkref.sh ../edge264/edge264_test "$TEST_FILE" $N "$ref"
          a=$(md5sum < "$plugin"); b=$(md5sum < "$ref")
          echo "plugin (vspipe): $a"; echo "edge264 ref:     $b"
          [ "$a" = "$b" ] && echo "bit-exact: OK" || { echo "bit-exact: MISMATCH"; exit 1; }

  avisynth:
    name: Real AviSynth+ runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch edge264-mvc
        run: git clone --depth 1 --branch "$EDGE264_REF" https://github.com/jens-duttke/edge264-mvc ../edge264
      - name: Build and install AviSynth+
        run: |
          # Pinned to AVSPLUS_REF (kept in sync with the vendored avisynth*.h). The
          # core library (libavisynth.so) is all the plugin + host link/run against;
          # installing to /usr/local + ldconfig puts it on the default search path.
          git clone --depth 1 --branch "$AVSPLUS_REF" https://github.com/AviSynth/AviSynthPlus /tmp/avsplus
          cd /tmp/avsplus
          # AviSynth+ autoloads every plugin in its plugin dirs on the first
          # LoadPlugin, and the bundled shibatch's init segfaults in this headless
          # build. Our host loads the plugin explicitly, so we don't need the bundled
          # plugins: ENABLE_PLUGINS=OFF leaves the system plugin dir empty, and
          # pointing the configurable user plugin dir at that same empty dir stops it
          # defaulting to $HOME/.local/lib/avisynth (which could autoload a stray one).
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DENABLE_PLUGINS=OFF -DUSER_AVS_PLUGINDIR_LOCATION=/usr/local/lib/avisynth
          cmake --build build -j"$(nproc)"
          sudo cmake --install build
          sudo ldconfig
      - name: Build the AviSynth+ plugin
        run: make libavsmvc.so
      - name: Load in a real AviSynth+ and bit-exact vs edge264 (regenerated reference)
        run: |
          # check-avs loads the plugin through a real AviSynth+ (properties, all
          # layouts, error paths), then md5-compares one frame against an edge264
          # reference regenerated in the run - so bit-exactness is CI-gated here too.
          sudo apt-get update && sudo apt-get install -y ffmpeg
          make check-avs TEST_FILE="$TEST_FILE"

  windows-cross:
    name: Windows cross-build (MinGW) + core bit-exact via Wine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch edge264-mvc
        run: git clone --depth 1 --branch "$EDGE264_REF" https://github.com/jens-duttke/edge264-mvc ../edge264
      - name: Install MinGW-w64, Wine and ffmpeg
        run: |
          # gcc-mingw-w64-x86-64 pulls in binutils (dlltool). No g++ needed: both
          # plugins and the tests are C.
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 wine64 ffmpeg
      - name: Linux edge264_test (generates the bit-exact reference)
        run: make -C ../edge264 STATIC=yes BUILDTEST=no edge264_test
      - name: Cross-build edge264 for Windows (separate tree)
        run: |
          # a separate tree so the Windows objects do not clobber the Linux
          # edge264_test built above (same object/.a names per OS).
          cp -r ../edge264 ../edge264-win
          make -C ../edge264-win clean
          make -C ../edge264-win OS=windows CC=x86_64-w64-mingw32-gcc STATIC=yes BUILDTEST=no
      - name: Cross-build both plugin DLLs and verify their exports
        run: |
          make libavsmvc.dll CC=x86_64-w64-mingw32-gcc DLLTOOL=x86_64-w64-mingw32-dlltool \
            EDGE264_SRC=../edge264-win EDGE264_MAKE="OS=windows CC=x86_64-w64-mingw32-gcc"
          file libavsmvc.dll
          x86_64-w64-mingw32-objdump -p libavsmvc.dll | grep -A2 "Ordinal/Name Pointer"
          # exactly avisynth_c_plugin_init is exported and no edge264 symbol leaks
          x86_64-w64-mingw32-objdump -p libavsmvc.dll | grep -q "] avisynth_c_plugin_init"
          test "$(x86_64-w64-mingw32-objdump -p libavsmvc.dll | grep -c -i edge264)" = "0"
          make libvsmvc.dll CC=x86_64-w64-mingw32-gcc DLLTOOL=x86_64-w64-mingw32-dlltool \
            EDGE264_SRC=../edge264-win EDGE264_MAKE="OS=windows CC=x86_64-w64-mingw32-gcc"
          file libvsmvc.dll
          # exactly VapourSynthPluginInit2 is exported and no edge264 symbol leaks
          x86_64-w64-mingw32-objdump -p libvsmvc.dll | grep -q "VapourSynthPluginInit2"
          test "$(x86_64-w64-mingw32-objdump -p libvsmvc.dll | grep -c -i edge264)" = "0"
      - name: Windows core bit-exact via Wine (proves the Win32 I/O shim)
        run: |
          make coretest.exe CC=x86_64-w64-mingw32-gcc \
            EDGE264_SRC=../edge264-win EDGE264_MAKE="OS=windows CC=x86_64-w64-mingw32-gcc"
          export WINEDEBUG=-all
          # a relative path in the CWD (Wine maps the working dir to a drive letter),
          # the path form validated locally via the WSL Windows-interop run.
          N=5
          cp "$TEST_FILE" ./win_input.264
          wine coretest.exe win_input.264 0 $N win_frame.yuv
          sh tests/mkref.sh ../edge264/edge264_test win_input.264 $N ref_frame.yuv
          a=$(md5sum < win_frame.yuv); b=$(md5sum < ref_frame.yuv)
          echo "windows core (wine): $a"; echo "edge264 ref:         $b"
          [ "$a" = "$b" ] && echo "Windows core bit-exact: OK" || { echo "MISMATCH"; exit 1; }
