# Builds the four distributable plugin binaries and attaches them to the GitHub
# Release when a version tag (v*) is pushed:
#   libvsmvc.so   - Linux   VapourSynth plugin
#   libavsmvc.so  - Linux   AviSynth+  plugin
#   libvsmvc.dll  - Windows VapourSynth plugin (MinGW cross-build)
#   libavsmvc.dll - Windows AviSynth+  plugin (MinGW cross-build)
# Each statically links edge264-mvc (pinned by EDGE264_REF) and has no external
# runtime dependency beyond the host. The build commands mirror tests.yml, where
# correctness is gated; this workflow only packages and publishes.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create/update the release and upload assets

env:
  # edge264-mvc release the binaries are built against. Keep in sync with
  # tests.yml's EDGE264_REF; bump both to the matching edge264-mvc tag.
  EDGE264_REF: v2026.07.18
  # Portable ISA for the DISTRIBUTED Linux .so builds. edge264's native build
  # injects -march=native, which bakes in whatever ISA the CI runner happens to
  # have; a runner with AVX-512 once produced a .so that crashed with SIGILL on
  # every CPU without AVX-512 (the v0.4.4 regression). Pin the x86-64-v2 floor
  # (SSE4.2, runs on ~2009+ CPUs) and let edge264's runtime dispatch lift the
  # parser to AVX2 (x86-64-v3) where the CPU has it - full speed on modern CPUs,
  # no illegal instruction on old ones. The Windows cross-build steps set
  # EDGE264_MAKE on the command line (OS=windows...), which overrides this env
  # value, so this only affects the native Linux builds (the Windows DLL is
  # already ISA-baseline via the MinGW cross-compile).
  EDGE264_MAKE: "VARIANTS=x86-64-v2,x86-64-v3 CFLAGS=-march=x86-64-v2"

jobs:
  release-binaries:
    name: Build binaries and attach them to the release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-tags: true      # gh release --notes-from-tag needs the annotated
          fetch-depth: 0        # tag's message; a shallow checkout omits it and
                                # the notes silently fall back to the commit message
      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Fetch edge264-mvc
        run: git clone --depth 1 --branch "$EDGE264_REF" https://github.com/jens-duttke/edge264-mvc ../edge264
      - name: Build the Linux plugins (.so)
        # Portable ISA floor via EDGE264_MAKE (see env) - never -march=native for a
        # distributed binary.
        run: make libvsmvc.so libavsmvc.so
      - name: Verify the Linux plugins carry no AVX-512 (portable ISA floor)
        # Guard against a reintroduced native build: a distributed .so must contain
        # no AVX-512 (EVEX-prefixed) instructions, or it SIGILLs on any CPU without
        # AVX-512. In 64-bit code the opcode byte 0x62 is the EVEX prefix - but 0x62
        # also occurs as the first byte of relocated pointer DATA that objdump's
        # linear sweep frames inside .text (e.g. the function-pointer setup in
        # edge264_alloc) as a bare, undecodable "addr:\t62 xx xx xx" line with NO
        # mnemonic - too short to be a valid EVEX op, and objdump resyncs on the
        # next real instruction (confirmed data, not code, on binutils 2.42). A real
        # AVX-512 instruction always disassembles to a mnemonic; these artifacts
        # never do. So count only 0x62 lines objdump actually decoded into an
        # instruction (bytes, then a tab, then a mnemonic) - real EVEX is caught, the
        # data artifacts are not. (A plain "grep 62 " false-positived a release
        # build on such artifacts.)
        run: |
          for so in libvsmvc.so libavsmvc.so; do
            n=$(objdump -d "$so" | grep -cP '^\s+[0-9a-f]+:\t62 [0-9a-f ]*\t\S' || true)
            echo "$so: $n AVX-512 (EVEX) instruction(s)"
            test "$n" = 0
          done
      - name: Cross-build edge264-mvc for Windows (separate tree)
        run: |
          cp -r ../edge264 ../edge264-win
          make -C ../edge264-win clean
          make -C ../edge264-win OS=windows CC=x86_64-w64-mingw32-gcc STATIC=yes BUILDTEST=no
      - name: Cross-build the Windows plugins (.dll)
        run: |
          make libvsmvc.dll  CC=x86_64-w64-mingw32-gcc DLLTOOL=x86_64-w64-mingw32-dlltool \
            EDGE264_SRC=../edge264-win EDGE264_MAKE="OS=windows CC=x86_64-w64-mingw32-gcc"
          make libavsmvc.dll CC=x86_64-w64-mingw32-gcc DLLTOOL=x86_64-w64-mingw32-dlltool \
            EDGE264_SRC=../edge264-win EDGE264_MAKE="OS=windows CC=x86_64-w64-mingw32-gcc"
      - name: Verify the Windows exports (only the plugin entry, no edge264 leak)
        run: |
          x86_64-w64-mingw32-objdump -p libvsmvc.dll  | grep -q "VapourSynthPluginInit2"
          test "$(x86_64-w64-mingw32-objdump -p libvsmvc.dll  | grep -c -i edge264)" = "0"
          x86_64-w64-mingw32-objdump -p libavsmvc.dll | grep -q "avisynth_c_plugin_init"
          test "$(x86_64-w64-mingw32-objdump -p libavsmvc.dll | grep -c -i edge264)" = "0"
      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files="libvsmvc.so libavsmvc.so libvsmvc.dll libavsmvc.dll"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" $files --clobber
          else
            gh release create "$GITHUB_REF_NAME" $files \
              --title "$GITHUB_REF_NAME" --notes-from-tag --verify-tag
          fi
